{% extends "base.html" %}
{% block content %}
<h2>Graphical Output</h2>
{% if plot_exists %}
<p>Generated by Flask/Python from SQL output and saved as a PNG file.</p>
<img src="{{ url_for('static', filename='condensate_type_counts.png') }}" alt="Condensate type distribution">
{% else %}
<p>Could not generate plot because no data was available.</p>
{% endif %}
{% endblock %}
